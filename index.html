<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestige Home Appliances</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body { background:#0b3d91; }

/* HEADER */
.header {
    background:#062c6f;
    color:white;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo { font-weight:bold; font-size:20px; }

.nav { display:flex; gap:20px; align-items:center; }

.cart-count {
    background:red;
    padding:2px 6px;
    border-radius:50%;
    font-size:12px;
}

/* SEARCH */
.search-bar {
    display:flex;
    justify-content:center;
    padding:15px;
}

.search-bar input {
    width:50%;
    padding:10px;
}

.search-bar button {
    padding:10px;
    background:orange;
    border:none;
    color:white;
}

/* MAIN */
.main { display:flex; padding:20px; }

/* SIDEBAR */
.sidebar {
    width:20%;
    background:white;
    border-radius:10px;
    padding:10px;
}

.sidebar li {
    padding:12px;
    cursor:pointer;
}

.sidebar li:hover { background:#eee; }

/* HERO */
.hero {
    width:80%;
    margin-left:20px;
    height:260px;
    border-radius:10px;
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db');
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}

/* FLASH */
.flash {
    background:orange;
    color:white;
    text-align:center;
    padding:10px;
    margin:20px;
    border-radius:10px;
}

/* PRODUCTS */
.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}

.card:hover { transform:scale(1.05); }

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.price { color:#0b3d91; font-weight:bold; }

.discount {
    color:red;
    font-size:13px;
}

/* FOOTER */
footer {
    background:#062c6f;
    color:white;
    text-align:center;
    padding:15px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .main { flex-direction:column; }
    .sidebar { width:100%; }
    .hero { width:100%; margin-left:0; margin-top:10px; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Prestige Home Appliances</div>
    <div class="nav">
        <span>Account</span>
        <span onclick="goCart()">Cart 🛒 <span id="count" class="cart-count">0</span></span>
    </div>
</div>

<!-- SEARCH -->
<div class="search-bar">
    <input type="text" id="search" placeholder="Search TVs, Cookers, Woofers...">
    <button onclick="searchProducts()">Search</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <ul class="sidebar">
        <li onclick="filter('tv')">📺 Televisions</li>
        <li onclick="filter('cooker')">🍳 Cookers</li>
        <li onclick="filter('woofer')">🔊 Woofers</li>
        <li onclick="filter('dishwasher')">🍽 Dishwashers</li>
    </ul>

    <!-- HERO -->
    <div class="hero">
        <h1>🔥 Upgrade Your Home with Premium Appliances</h1>
    </div>

</div>

<!-- FLASH -->
<div class="flash">
    ⚡ Flash Sale Ends In: <span id="timer"></span>
</div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Prestige Home Appliances | Nairobi, Kenya</p>
</footer>

<script>
// PRODUCTS
const products = [
 {id:1,name:'Samsung 55" Smart TV',price:65000,old:72000,cat:"tv",img:"https://images.unsplash.com/photo-1593784991095-a205069470b6"},
 {id:2,name:'LG 43" Smart TV',price:48000,old:55000,cat:"tv",img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
 {id:3,name:"Ramtons Cooker",price:35000,old:40000,cat:"cooker",img:"https://images.unsplash.com/photo-1581578731548-c64695cc6952"},
 {id:4,name:"Sony Woofer",price:28000,old:32000,cat:"woofer",img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"},
 {id:5,name:"LG Dishwasher",price:55000,old:62000,cat:"dishwasher",img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"}
];

// DISPLAY
function display(data){
 let container=document.getElementById("products");
 container.innerHTML="";
 data.forEach(p=>{
  container.innerHTML+=`
  <div class="card">
    <img src="${p.img}">
    <h4>${p.name}</h4>
    <p class="price">KSh ${p.price}</p>
    <p class="discount"><s>KSh ${p.old}</s> - SAVE!</p>
    <button onclick="add(${p.id})">Add to Cart</button>
  </div>`;
 });
}
display(products);

// CART
function add(id){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 cart.push(id);
 localStorage.setItem("cart",JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 document.getElementById("count").innerText=cart.length;
}
updateCart();

// FILTER
function filter(cat){
 let filtered=products.filter(p=>p.cat===cat);
 display(filtered);
}

// SEARCH
function searchProducts(){
 let val=document.getElementById("search").value.toLowerCase();
 let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
 display(filtered);
}

// CART PAGE
function goCart(){
 alert("Cart page coming next step!");
}

// TIMER
let time=3600;
setInterval(()=>{
 let h=Math.floor(time/3600);
 let m=Math.floor((time%3600)/60);
 let s=time%60;
 document.getElementById("timer").innerText=`${h}h ${m}m ${s}s`;
 time--;
},1000);

</script>

</body>
</html>
